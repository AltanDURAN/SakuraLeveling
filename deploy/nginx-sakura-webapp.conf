# Nginx reverse proxy pour le webapp SakuraLeveling.
#
# Usage : copier ce fichier dans /etc/nginx/sites-available/sakura-webapp
# puis créer un symlink dans /etc/nginx/sites-enabled/ et reload nginx.
# Le script setup_webapp_public.sh fait tout ça automatiquement.
#
# Pour ajouter un nom de domaine + HTTPS plus tard, remplace `_` par
# `ton-domaine.com` ci-dessous puis lance `sudo certbot --nginx -d ton-domaine.com`.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # `_` = catch-all : sert sur n'importe quel hostname (incluant l'IP brute).
    # Remplace par `ton-domaine.com` quand tu auras un domaine.
    server_name _;

    # Limite la taille des requêtes (le webapp est en lecture seule, pas
    # d'upload attendu)
    client_max_body_size 1m;

    # Logs dédiés (utile pour debug + monitoring du trafic)
    access_log /var/log/nginx/sakura-webapp.access.log;
    error_log /var/log/nginx/sakura-webapp.error.log;

    # Redirection vers le webapp FastAPI tournant en local sur le port 8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers standard de reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts raisonnables (le rendu SVG est rapide, mais marge de
        # sécurité pour les gros arbres)
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Pas de buffering pour rester réactif sur les pages dynamiques
        proxy_buffering off;
    }

    # Cache agressif sur les statiques (CSS/JS du skill tree)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
